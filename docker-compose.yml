services:
  order-generator-api:
    build:
      context: .
      dockerfile: src/OrderGenerator/OrderGenerator.API/Dockerfile
    ports:
      - "5159:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db-ordergenerator;Port=5432;Database=ordergenerator;Username=postgres;Password=${DB_PASSWORD_ORDERGEN:-postgres}
      - OpenTelemetry__Endpoint=http://otel-collector:4317
    depends_on:
      db-ordergenerator:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - fix_store_ordergen:/app/store
      - fix_log_ordergen:/app/log
    healthcheck:
      test: ["CMD", "sh", "-c", "wc -c /app/*.dll || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: on-failure
    networks:
      - challenge-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  order-accumulator-api:
    build:
      context: .
      dockerfile: src/OrderAccumulator/OrderAccumulator.API/Dockerfile
    ports:
      - "64164:8080"
      - "5002:5002"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db-orderaccumulator;Port=5432;Database=orderaccumulator;Username=postgres;Password=${DB_PASSWORD_ORDERACC:-postgres}
      - ConnectionStrings__Redis=redis:6379
      - OpenTelemetry__Endpoint=http://otel-collector:4317
    depends_on:
      db-orderaccumulator:
        condition: service_healthy
      redis:
        condition: service_healthy
      otel-collector:
        condition: service_started
    volumes:
      - fix_store_orderacc:/app/store
      - fix_log_orderacc:/app/log
    healthcheck:
      test: ["CMD", "sh", "-c", "wc -c /app/*.dll || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: on-failure
    networks:
      - challenge-net
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  order-generator-ui:
    build:
      context: src/order-generator
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      order-generator-api:
        condition: service_started
      order-accumulator-api:
        condition: service_started
    networks:
      - challenge-net
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"

  db-ordergenerator:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD_ORDERGEN:-postgres}
      POSTGRES_DB: ordergenerator
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ordergenerator -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata_ordergenerator:/var/lib/postgresql/data
    networks:
      - challenge-net

  db-orderaccumulator:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD_ORDERACC:-postgres}
      POSTGRES_DB: orderaccumulator
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orderaccumulator -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata_orderaccumulator:/var/lib/postgresql/data
    networks:
      - challenge-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 5
    networks:
      - challenge-net

  # ── Observability stack (PR 1: traces + metrics) ──────────────────────
  # Receives OTLP from the .NET services (added in PR 2) and exports
  # traces to Tempo and metrics via its own Prometheus pull endpoint.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.107.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus pull endpoint (scraped by Prometheus)
    restart: unless-stopped
    networks:
      - challenge-net

  # Distributed tracing storage; queried by Grafana via the Tempo datasource.
  tempo:
    image: grafana/tempo:2.5.0
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo/config.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
    restart: unless-stopped
    networks:
      - challenge-net

  # Metrics scraper; pulls from OTel collector + .NET /metrics (PR 2).
  prometheus:
    image: prom/prometheus:v2.54.0
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - challenge-net

  # Visualization. Datasources (Prometheus + Tempo) are auto-provisioned.
  # Default credentials: admin / admin (change in production).
  grafana:
    image: grafana/grafana:11.2.0
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - tempo
    restart: unless-stopped
    networks:
      - challenge-net

volumes:
  pgdata_ordergenerator:
  pgdata_orderaccumulator:
  prometheus_data:
  tempo_data:
  grafana_data:
  fix_store_ordergen:
  fix_log_ordergen:
  fix_store_orderacc:
  fix_log_orderacc:

networks:
  challenge-net:
    driver: bridge
