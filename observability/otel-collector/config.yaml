# OpenTelemetry Collector - receives OTLP from .NET services and fans out
# to Tempo (traces) and Prometheus (metrics). Logs are routed to Loki in PR 3.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  # Traces -> Tempo
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
    sending_queue:
      enabled: true
    retry_on_failure:
      enabled: true

  # Metrics -> Prometheus remote_write style (Tigertank) via otlp
  # We expose a Prometheus pull endpoint so prometheus can scrape the collector
  prometheus:
    endpoint: 0.0.0.0:8889
    add_metric_suffixes: true
    resource_to_telemetry_conversion:
      enabled: true

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo, debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
  telemetry:
    logs:
      level: info
