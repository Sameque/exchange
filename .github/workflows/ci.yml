name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: |
          dotnet restore src/OrderAccumulator/OrderAccumulator.slnx
          dotnet restore src/OrderGenerator/OrderGenerator.slnx

      - name: Build
        run: |
          dotnet build src/OrderAccumulator/OrderAccumulator.slnx --no-restore --configuration Release
          dotnet build src/OrderGenerator/OrderGenerator.slnx --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test src/OrderAccumulator/OrderAccumulator.slnx --configuration Release --no-build --verbosity normal
          dotnet test src/OrderGenerator/OrderGenerator.slnx --configuration Release --no-build --verbosity normal

  angular:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: src/order-generator/package-lock.json

      - name: Install dependencies
        working-directory: src/order-generator
        run: npm ci

      - name: Lint
        working-directory: src/order-generator
        run: npm run lint

      - name: Build
        working-directory: src/order-generator
        run: npm run build